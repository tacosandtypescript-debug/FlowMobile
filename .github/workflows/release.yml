name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
      - run: >-
          python -m pip install --disable-pip-version-check --require-hashes
          --only-binary=:all: --no-deps -r requirements.lock
      - name: Verificar versión y pruebas
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
          python -m unittest discover -s tests -v
      - name: Crear paquetes y checksums
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          mkdir -p release
          git archive --format=tar.gz --prefix="FlowMobile-${VERSION}/" -o "release/FlowMobile-${VERSION}.tar.gz" HEAD
          git archive --format=zip --prefix="FlowMobile-${VERSION}/" -o "release/FlowMobile-${VERSION}.zip" HEAD
          cp bootstrap_ios.py install_ios.py install.sh install-termux.sh install-linux.sh install-windows.ps1 release/
          (cd release && sha256sum FlowMobile-* bootstrap_ios.py install_ios.py install.sh install-termux.sh install-linux.sh install-windows.ps1 > SHA256SUMS)
          python scripts/release_notes.py "$VERSION" > release/RELEASE_NOTES.md
      - name: Atestar procedencia de los paquetes
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            release/FlowMobile-*.tar.gz
            release/FlowMobile-*.zip
            release/bootstrap_ios.py
            release/install_ios.py
            release/install.sh
            release/install-termux.sh
            release/install-linux.sh
            release/install-windows.ps1
            release/SHA256SUMS
      - name: Publicar GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/FlowMobile-*.tar.gz \
            release/FlowMobile-*.zip \
            release/bootstrap_ios.py \
            release/install_ios.py \
            release/install.sh \
            release/install-termux.sh \
            release/install-linux.sh \
            release/install-windows.ps1 \
            release/SHA256SUMS \
            --verify-tag \
            --title "FlowMobile ${GITHUB_REF_NAME#v}" \
            --notes-file release/RELEASE_NOTES.md
