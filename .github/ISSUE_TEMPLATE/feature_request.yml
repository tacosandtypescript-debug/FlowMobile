name: Enviar una sugerencia
description: Proponer una función, plataforma o mejora de la interfaz
title: "[Sugerencia] "
labels: [enhancement]
body:
  - type: dropdown
    id: category
    attributes:
      label: Categoría
      options:
        - Nueva función
        - Nueva plataforma
        - Interfaz y accesibilidad
        - Instalación o actualización
        - Otra mejora
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Sugerencia
      description: Explica qué te gustaría mejorar y cómo debería funcionar.
    validations:
      required: true
  - type: textarea
    id: benefit
    attributes:
      label: Beneficio
      description: ¿A quién ayudaría o qué problema resolvería?
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacidad
      options:
        - label: Confirmo que no incluí cookies, contraseñas, tokens ni enlaces privados.
          required: true
