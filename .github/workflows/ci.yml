name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --disable-pip-version-check --require-hashes --only-binary=:all: --no-deps -r requirements.lock
      - run: python -m compileall -q flow main.py install_ios.py bootstrap_ios.py
      - run: python -m unittest discover -s tests -v

  installers:
    name: Instaladores y publicación
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check --require-hashes --only-binary=:all: --no-deps -r requirements.lock
      - name: Comprobar release
        shell: pwsh
        run: .\scripts\check-release.ps1
      - name: Comprobar scripts POSIX
        shell: bash
        run: bash -n install.sh install-termux.sh install-ios.sh scripts/flow scripts/check-device.sh
