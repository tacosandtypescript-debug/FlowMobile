name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements.txt
      - run: python -m compileall -q flow main.py install_ios.py bootstrap_ios.py
      - run: python -m unittest discover -s tests -v

  installers:
    name: Instaladores y publicación
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Comprobar release
        shell: pwsh
        run: .\scripts\check-release.ps1
      - name: Comprobar scripts POSIX
        shell: bash
        run: bash -n install.sh install-termux.sh install-ios.sh scripts/flow scripts/check-device.sh
